name: Release

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag to release, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: rmux
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            binary: rmux
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            binary: rmux
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: rmux.exe
            archive: zip
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      TARGET: ${{ matrix.target }}
      BINARY: ${{ matrix.binary }}
      BUILD_PROFILE: release
      PROFILE_DIR: release
    steps:
      - name: Validate release ref
        shell: bash
        run: |
          if [[ ! "$RELEASE_REF" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release ref: $RELEASE_REF" >&2
            exit 1
          fi
          echo "TAG=$RELEASE_REF" >> "$GITHUB_ENV"
          echo "VERSION=${RELEASE_REF#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_REF }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Fetch locked dependencies
        run: cargo fetch --locked

      - name: Build rmux
        shell: bash
        run: cargo build --package rmux --locked --profile "$BUILD_PROFILE" --target "$TARGET"

      - name: Inspect release binary
        shell: bash
        run: |
          bin="target/$TARGET/$PROFILE_DIR/$BINARY"
          test -x "$bin"
          ls -lh "$bin"
          if [[ "$RUNNER_OS" != "Windows" ]]; then
            file "$bin"
          fi

      - name: Re-sign macOS binary
        if: runner.os == 'macOS'
        shell: bash
        run: |
          bin="target/$TARGET/$PROFILE_DIR/$BINARY"
          codesign --force --sign - "$bin"
          codesign --verify --verbose=2 "$bin"

      - name: Smoke binary
        shell: bash
        run: |
          bin="target/$TARGET/$PROFILE_DIR/$BINARY"
          "$bin" -V | tee version.txt
          grep -F "rmux $VERSION" version.txt

      - name: Create Unix archive
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          package="rmux-$TAG-$TARGET"
          mkdir -p "dist/$package"
          cp "target/$TARGET/$PROFILE_DIR/$BINARY" "dist/$package/rmux"
          cp README.md LICENSE-APACHE LICENSE-MIT rmux.1 "dist/$package/"
          chmod +x "dist/$package/rmux"
          tar -czf "dist/$package.tar.gz" -C dist "$package"

      - name: Create Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $package = "rmux-$env:TAG-$env:TARGET"
          New-Item -ItemType Directory -Force -Path "dist/$package" | Out-Null
          Copy-Item "target/$env:TARGET/$env:PROFILE_DIR/$env:BINARY" "dist/$package/rmux.exe"
          Copy-Item README.md, LICENSE-APACHE, LICENSE-MIT, rmux.1 "dist/$package/"
          Compress-Archive -Path "dist/$package" -DestinationPath "dist/$package.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: rmux-${{ env.RELEASE_REF }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build
    env:
      RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-assets
          shopt -s nullglob
          assets=( *.tar.gz *.zip )
          if (( ${#assets[@]} == 0 )); then
            echo "No release archives found" >&2
            exit 1
          fi
          printf '%s\0' "${assets[@]}" | sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Create or update release
        shell: bash
        run: |
          tag="$RELEASE_REF"
          version="${tag#v}"
          if ! gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "$tag" \
              --notes "RMUX $version binary release."
          fi
          gh release upload "$tag" --repo "$GITHUB_REPOSITORY" release-assets/* --clobber
